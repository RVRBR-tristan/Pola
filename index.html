<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Pola — photos instantanées</title>
  <meta name="description" content="Prends une photo, place-la dans un vrai cadre Polaroid avec un rendu film instantané, exporte en 4:5 pour Instagram.">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/manifest-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pola">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Viseur ─────────────────────────────────────────── -->
  <main id="shoot" class="screen is-active" aria-label="Viseur">
    <header class="topbar">
      <img class="wordmark" src="assets/pola-logo.svg" alt="Pola">
      <span class="topbar-right">
        <span class="topbar-film" id="film-label">600</span>
        <button class="icon-btn" id="btn-flash" aria-label="Flash" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13 2 4.5 13.5H11L9.8 22l8.7-11.5H12L13 2Z"/></svg>
        </button>
        <button class="icon-btn" id="btn-gallery" aria-label="Galerie">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h7v7H4V4Zm9 0h7v7h-7V4ZM4 13h7v7H4v-7Zm9 0h7v7h-7v-7Z"/></svg>
        </button>
      </span>
    </header>

    <div class="stage">
      <div class="polaroid-live" id="polaroid-live">
        <div class="polaroid-live-window" id="live-window">
          <video id="camera" autoplay playsinline muted></video>
          <div class="camera-off" id="camera-off" hidden>
            <p>Caméra indisponible.<br>Importe une photo pour commencer.</p>
          </div>
        </div>
        <img class="polaroid-live-frame" id="live-frame" src="assets/frame-600.png" alt="">
      </div>
    </div>

    <div class="film-strip" id="film-strip" role="radiogroup" aria-label="Film"></div>
    <div class="chip-row" id="shoot-frame-strip" role="radiogroup" aria-label="Cadre"></div>

    <div class="controls">
      <button class="ctrl" id="btn-import" aria-label="Importer une photo">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 17V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Zm2-1.4 3.6-4.2a1 1 0 0 1 1.5 0l2.6 3 1.5-1.7a1 1 0 0 1 1.5 0l3.3 3.9V5H6ZM15.5 10a1.7 1.7 0 1 1 0-3.4 1.7 1.7 0 0 1 0 3.4Z"/></svg>
      </button>
      <button class="shutter" id="btn-shutter" aria-label="Déclencher">
        <span class="shutter-ring" aria-hidden="true"></span>
      </button>
      <button class="ctrl" id="btn-flip" aria-label="Changer de caméra">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V2.5L8 6l4 3.5V7a5.5 5.5 0 1 1-5.4 6.6l-1.96.4A7.5 7.5 0 1 0 12 5Z"/></svg>
      </button>
    </div>
    <input type="file" id="file-input" accept="image/*" hidden>
  </main>

  <!-- ── Éditeur ────────────────────────────────────────── -->
  <section id="edit" class="screen" aria-label="Éditeur">
    <header class="topbar">
      <button class="back" id="btn-back">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5 8 11.5l6.5 6.5 1.4-1.4-5.1-5.1 5.1-5.1L14.5 5Z"/></svg>
        Retour
      </button>
      <span class="topbar-film" id="edit-film-label">600</span>
      <button class="icon-btn icon-btn-primary" id="btn-download" aria-label="Télécharger">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.2 7.6 10.8 9 9.4l2 2V3h2v8.4l2-2 1.4 1.4-4.4 4.4ZM5 19v2h14v-2H5Z"/></svg>
      </button>
    </header>

    <div class="stage stage-edit">
      <div class="polaroid-out" id="polaroid-out">
        <canvas id="render-canvas"></canvas>
        <div class="dev-overlay" id="dev-overlay" hidden></div>
      </div>
    </div>

    <div class="drawer">
      <div class="chip-row drawer-pane" id="edit-film-strip" role="radiogroup" aria-label="Film"></div>
      <div class="chip-row drawer-pane" id="frame-strip" role="radiogroup" aria-label="Cadre" hidden></div>

      <div class="drawer-pane reglages-icons" id="drawer-reglages" hidden>
        <button class="ric" data-key="expo">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2Zm0 18L4 4h16v16ZM10 5H5v2h5V5Zm5 12v2h2v-2h2v-2h-2v-2h-2v2h-2v2h2Z"/></svg>
          <span>Exposition</span>
        </button>
        <button class="ric" data-key="contrast">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2Zm0 18V4c4.41 0 8 3.59 8 8s-3.59 8-8 8Z"/></svg>
          <span>Contraste</span>
        </button>
        <button class="ric" data-key="sat">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.69 6.34 8.35a8 8 0 1 0 11.31 0L12 2.69ZM12 20a6 6 0 0 1-6-6c0-1.6.62-3.11 1.76-4.24L12 5.52l4.24 4.24A5.94 5.94 0 0 1 18 14a6 6 0 0 1-6 6Z"/></svg>
          <span>Saturation</span>
        </button>
        <button class="ric" data-key="grain">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0ZM9.5 8.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0ZM6 12a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm-10.5 3.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0ZM6 19a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm7 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z"/></svg>
          <span>Grain</span>
        </button>
        <button class="ric" data-key="blur">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm0 6a2 2 0 1 1 0-4 2 2 0 0 1 0 4ZM12 2a1 1 0 1 0 0 2 1 1 0 0 0 0-2Zm0 18a1 1 0 1 0 0 2 1 1 0 0 0 0-2ZM4 11a1 1 0 1 0 0 2 1 1 0 0 0 0-2Zm16 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2ZM6.3 5.3a1 1 0 1 0 0 2 1 1 0 0 0 0-2Zm11.4 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2Zm-11.4 11.4a1 1 0 1 0 0 2 1 1 0 0 0 0-2Zm11.4 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z"/></svg>
          <span>Flou radial</span>
        </button>
        <button class="ric" data-key="fond">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12h-2v3h-3v2h5v-5ZM7 9h3V7H5v5h2V9Zm14-6H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2Zm0 16.01H3V4.99h18v14.02Z"/></svg>
          <span>Fond 4:5</span>
        </button>
      </div>

      <div class="drawer-pane control-pane" id="drawer-control" hidden>
        <button class="ctl-btn" id="ctl-cancel" aria-label="Annuler">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z"/></svg>
        </button>
        <div class="ctl-body">
          <div class="adjust-row" id="row-expo" hidden>
            <label for="adj-expo">Exposition</label>
            <input type="range" id="adj-expo" min="-100" max="100" value="0" step="1">
            <button class="adjust-val" id="adj-expo-val" title="Réinitialiser">0</button>
          </div>
          <div class="adjust-row" id="row-contrast" hidden>
            <label for="adj-contrast">Contraste</label>
            <input type="range" id="adj-contrast" min="-100" max="100" value="0" step="1">
            <button class="adjust-val" id="adj-contrast-val" title="Réinitialiser">0</button>
          </div>
          <div class="adjust-row" id="row-sat" hidden>
            <label for="adj-sat">Saturation</label>
            <input type="range" id="adj-sat" min="0" max="160" value="82" step="1">
            <button class="adjust-val" id="adj-sat-val" title="Réinitialiser">82</button>
          </div>
          <div class="adjust-row" id="row-grain" hidden>
            <label for="adj-grain">Grain</label>
            <input type="range" id="adj-grain" min="0" max="100" value="18" step="1">
            <button class="adjust-val" id="adj-grain-val" title="Réinitialiser">18</button>
          </div>
          <div class="adjust-row" id="row-blur" hidden>
            <label for="adj-blur">Flou radial</label>
            <input type="range" id="adj-blur" min="0" max="100" value="0" step="1">
            <button class="adjust-val" id="adj-blur-val" title="Réinitialiser">0</button>
          </div>
          <div id="row-fond" hidden>
            <div class="adjust-row adjust-row-toggle">
              <label for="toggle-ig">Fond 4:5</label>
              <div class="ig-controls">
                <input type="checkbox" id="toggle-ig" class="switch">
                <div class="swatches" id="bg-swatches" hidden role="radiogroup" aria-label="Couleur du fond">
                  <button class="swatch swatch-blanc is-on" id="sw-blanc" role="radio" aria-checked="true" aria-label="Fond blanc"></button>
                  <button class="swatch swatch-noir" id="sw-noir" role="radio" aria-checked="false" aria-label="Fond noir"></button>
                </div>
              </div>
            </div>
            <div class="adjust-row" id="size-row" hidden>
              <label for="adj-size">Taille</label>
              <input type="range" id="adj-size" min="40" max="100" value="80" step="1">
              <button class="adjust-val" id="adj-size-val" title="Réinitialiser">80</button>
            </div>
          </div>
        </div>
        <button class="ctl-btn ctl-ok" id="ctl-ok" aria-label="Valider">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17Z"/></svg>
        </button>
      </div>
    </div>

    <nav class="bottombar" aria-label="Menus de l'éditeur">
      <button class="nav-item is-on" id="nav-films">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 3v2h-2V3H8v2H6V3H4v18h2v-2h2v2h8v-2h2v2h2V3h-2ZM8 17H6v-2h2v2Zm0-4H6v-2h2v2Zm0-4H6V7h2v2Zm10 8h-2v-2h2v2Zm0-4h-2v-2h2v2Zm0-4h-2V7h2v2Z"/></svg>
        <span>Films</span>
      </button>
      <button class="nav-item" id="nav-cadres">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 4h-4l-4-4-4 4H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2Zm0 16H4V6h4.52l3.52-3.5L15.52 6H20v14ZM18 8H6v10h12V8Z"/></svg>
        <span>Cadres</span>
      </button>
      <button class="nav-item" id="nav-reglages">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17v2h6v-2H3ZM3 5v2h10V5H3Zm10 16v-2h8v-2h-8v-2h-2v6h2ZM7 9v2H3v2h4v2h2V9H7Zm14 4v-2H11v2h10Zm-6-4h2V7h4V5h-4V3h-2v6Z"/></svg>
        <span>Réglages</span>
      </button>
    </nav>
  </section>

  <!-- ── Galerie ────────────────────────────────────────── -->
  <section id="gallery" class="screen" aria-label="Galerie">
    <header class="topbar">
      <button class="back" id="btn-gallery-back">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5 8 11.5l6.5 6.5 1.4-1.4-5.1-5.1 5.1-5.1L14.5 5Z"/></svg>
        Caméra
      </button>
      <span class="gallery-title">Galerie</span>
      <button class="select-btn" id="btn-select">Sélectionner</button>
    </header>

    <div class="gallery-scroll">
      <div class="gallery-grid" id="gallery-grid" role="list"></div>
      <p class="gallery-empty" id="gallery-empty" hidden>
        Aucun polaroid pour l'instant.<br>Tes photos se rangeront ici automatiquement.
      </p>
    </div>

    <div class="gallery-actions" id="gallery-actions" hidden>
      <button class="btn btn-soft" id="btn-select-all">Tout sélectionner</button>
      <button class="btn btn-danger" id="btn-delete" disabled>Supprimer</button>
    </div>
  </section>

  <div class="flash" id="flash" aria-hidden="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
